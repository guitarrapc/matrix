name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            rid: linux-x64
            artifact: matrix-linux-amd64
            ext: tar.gz
          - os: ubuntu-24.04-arm
            rid: linux-arm64
            artifact: matrix-linux-arm64
            ext: tar.gz
          - os: windows-2025
            rid: win-x64
            artifact: matrix-win-amd64
            ext: zip
          - os: windows-11-arm
            rid: win-arm64
            artifact: matrix-win-arm64
            ext: zip
          - os: macos-26
            rid: osx-arm64
            artifact: matrix-osx-arm64
            ext: tar.gz
          - os: macos-26-intel
            rid: osx-x64
            artifact: matrix-osx-amd64
            ext: tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish Native AOT
        shell: bash
        run: |
          dotnet publish matrix.cs \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:PublishAot=true \
            -o publish

      - name: Package (Unix)
        if: matrix.ext == 'tar.gz'
        shell: bash
        run: |
          cd publish
          tar -czf "../${{ matrix.artifact }}.tar.gz" matrix
          cd ..

      - name: Package (Windows)
        if: matrix.ext == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path publish/matrix.exe -DestinationPath "${{ matrix.artifact }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.${{ matrix.ext }}

  release:
    needs: publish
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
